<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon & Logo -->
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <meta name="color-scheme" content="dark light" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Apply persisted theme before first paint to avoid flash (default: dark) -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('portfolio-theme');
        var theme = (stored === 'light' || stored === 'dark') ? stored : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    })();
  </script>

  <!-- Google Search Console Verification -->
  <meta name="google-site-verification" content="dn7zrSFJ9YeU3Xf_YiNrlGOqahY9XnfirkrEmUio5IY" />

  <meta name="theme-color" content="#060607" />

  <!-- Title & Description -->
  <title>Rahul Bonala — Product Designer & Developer</title>
  <meta name="description"
    content="Rahul Bonala is a product designer and developer specialising in AI-native UI/UX. Building at Ginthi.ai, creator of BestAnswers.AI, and teaching AI Tools for Builders. Based in Bangalore, working globally." />

    content="Rahul Bonala, product designer AI, UI UX designer Bangalore, product developer, BestAnswers.AI, AI Tools for Builders" />
  <meta name="author" content="Sri Sai Rahul Bonala" />

  <!-- Sitemap hint -->
  <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

  <!-- Fonts: self-hosted (@font-face in src/fonts.css). Preload the two
       above-the-fold faces (display headline + body) so both are ready before
       first paint on every load. This is the fix for the font "jitter":
       same-origin + preload means the real font is always shown from the first
       frame (no swap to/from a fallback), and there's no layout shift (CLS 0). -->
  <link rel="preload" as="font" type="font/woff2" href="/fonts/syne-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="/fonts/jakarta-latin.woff2" crossorigin />
